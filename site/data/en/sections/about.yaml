summary: |
  I'm a Full Stack Developer with over 4 years of experience building web applications for the 
  banking, telecommunications, and public sector. At Accenture, I work as a Technical Lead on 
  projects built with React, Angular, Node.js, NestJS, and MongoDB.

  I like building solutions that are clear, solid, and useful, with strong attention to code 
  quality, development standards, and best practices. It's not enough for me that something just 
  works: I want to understand whether it's truly sustainable over time, maintainable, and built on 
  reliable foundations.

  I approach every project with a practical and responsible mindset, always looking for the right 
  balance between speed, quality, and the bigger picture. I keep learning through open source, 
  courses, certifications, and personal projects, because in tech, growth and improvement are part 
  of the job every single day.

  If you'd like to get to know me better, below you'll find all the ways to contact me and my CVs 
  to view or download.

