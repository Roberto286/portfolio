summary: |
  As a child, I used to watch my uncle, a computer technician, disassemble and reassemble computers, 
  fascinated by every single component. That's where my passion for technology began, 
  growing over time until it became my profession.

  I come from the hospitality industry, where I worked as a hotel receptionist, but after 2020 
  I decided to invest in my true passion: technology.

  Today, at Colossus Digital, I design and develop robust backends and efficient APIs for high-availability distributed systems. 
  I work with NestJS, MongoDB, Redis, and Angular on services handling thousands of concurrent requests.

  Clean architecture, API design, and data modeling are my daily bread. Code must be sustainable over time, 
  not just work today — that's my philosophy.

  When I'm not writing code, I enjoy walking in the countryside with my dog, experimenting in the kitchen 
  (especially vegetarian dishes), and dedicating time to personal projects and experiments.

  I'd love to connect. Reach out below!

