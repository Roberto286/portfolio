summary: |
  Da bambino osservavo mio zio informatico smontare e rimontare i computer, affascinato da ogni singola componente. 
  Da lì è nata la mia passione per la tecnologia, coltivata nel tempo fino a diventare il mio lavoro.

  Provengo dal mondo alberghiero, dove ho lavorato come receptionist in hotel, ma dopo il 2020 ho deciso 
  di investire nella mia vera passione: l'informatica.

  Oggi, in Colossus Digital, progetto e sviluppo backend robusti e API efficienti per sistemi distribuiti ad alta disponibilità. 
  Lavoro con NestJS, MongoDB e Angular su servizi che gestiscono migliaia di richieste concorrenti.

  Clean architecture, API design e data modeling sono il mio pane quotidiano. Il codice deve essere sostenibile nel tempo, 
  non solo funzionare oggi — questa è la mia filosofia.

  Quando non scrivo codice, mi piace passeggiare nel verde con il mio cane, 
  sperimentare in cucina (specialmente piatti vegetali) e dedicare tempo a progetti personali e sperimentazioni.

  Ti va di scambiare due chiacchiere? Qui sotto trovi come raggiungermi.

