summary: |
  Sono un Full Stack Developer con oltre 4 anni di esperienza nello sviluppo di applicazioni web per 
  il settore bancario, telecomunicazioni e pubblica amministrazione. In Accenture lavoro come 
  Technical Lead su progetti costruiti con React, Angular, Node.js, NestJS e MongoDB.
  
  Mi piace creare soluzioni chiare, solide e utili, con attenzione alla qualita' del codice, agli 
  standard di sviluppo e alle best practice. Non mi basta che qualcosa funzioni: mi interessa capire 
  se e' davvero sostenibile nel tempo, manutenibile e costruito su basi affidabili.

  Affronto ogni progetto con un approccio concreto e responsabile, cercando il giusto equilibrio tra 
  velocita', qualita' e visione d'insieme. Continuo a formarmi tra open source, corsi, certificazioni 
  e progetti personali, perche' nel tech crescere e migliorarsi fa parte del lavoro ogni giorno.

  Se ti va di conoscermi meglio, qui sotto trovi tutti i riferimenti per contattarmi e i miei CV da 
  visualizzare o scaricare.

