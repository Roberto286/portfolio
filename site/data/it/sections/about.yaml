summary: |
  Full Stack Developer con oltre 3 anni di esperienza nello sviluppo di applicazioni web scalabili 
  per settori bancario, telecomunicazioni e pubblica amministrazione. Attualmente Technical Lead in 
  Accenture, dove mi occupo di progettazione e sviluppo di architetture moderne con tecnologie come 
  React, Angular, Node.js, NestJS e MongoDB.
  
  Appassionato di continuous learning, contribuisco attivamente a progetti open source e mi mantengo 
  costantemente aggiornato attraverso corsi, certificazioni e progetti personali. Credo fortemente 
  nel valore del codice pulito, delle best practices e della collaborazione in team.

